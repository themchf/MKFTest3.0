<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKF Connect | Rx Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MKF Connect ⚕️</h1>
            <p>Direct-to-Pharmacy Prescription Portal</p>
        </header>

        <form id="prescriptionForm">
            <div class="form-section">
                <h3>Patient Information</h3>
                
                <div class="input-group">
                    <label for="patientName">Patient Name</label>
                    <input type="text" id="patientName" required placeholder="John Doe">
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="patientAge">Age</label>
                        <input type="number" id="patientAge" required placeholder="35">
                    </div>
                    <div class="input-group">
                        <label for="patientGender">Gender</label>
                        <select id="patientGender" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="patientPhone">Patient Phone Number</label>
                    <input type="tel" id="patientPhone" required placeholder="+1 234 567 8900">
                </div>
            </div>

            <div class="form-section">
                <h3>Medical Details</h3>
                <div class="input-group">
                    <label for="prescription">Prescription Details</label>
                    <textarea id="prescription" rows="5" required placeholder="1. Amoxicillin 500mg - Take 1 tablet every 8 hours for 7 days..."></textarea>
                </div>
            </div>

            <div class="form-section highlight">
                <h3>Destination</h3>
                <div class="input-group">
                    <label for="pharmacyNumber">Pharmacy WhatsApp Number (incl. country code)</label>
                    <input type="tel" id="pharmacyNumber" required placeholder="12345678900 (No + or spaces)">
                    <small>Example: 14155552671 (1 for US, followed by area code and number)</small>
                </div>
            </div>

            <button type="submit" class="submit-btn">Send to Pharmacy via WhatsApp</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
